<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect x="0" y="0" width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Bridge icon -->
  <g transform="translate(200, 160)">
    <!-- Bridge arch -->
    <path d="M-120,60 Q-120,-40 0,-60 Q120,-40 120,60" fill="none" stroke="url(#bridgeGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Bridge pillars -->
    <line x1="-80" y1="-20" x2="-80" y2="60" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="80" y1="-20" x2="80" y2="60" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <!-- Bridge deck -->
    <line x1="-115" y1="20" x2="115" y2="20" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Road/bridge surface -->
    <line x1="-120" y1="60" x2="120" y2="60" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="200" y="270" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="52" letter-spacing="-1">
    <tspan fill="#ffffff">FIELD</tspan><tspan fill="#f59e0b">BRIDGE</tspan>
  </text>
  <text x="200" y="305" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="20" fill="#94a3b8" letter-spacing="4">
    HQ
  </text>
  <text x="200" y="340" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="11" fill="#64748b" letter-spacing="2.5" text-transform="uppercase">
    CONSTRUCTION WORKFLOW SYSTEMS
  </text>
</svg>